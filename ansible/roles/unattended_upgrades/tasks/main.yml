---
- name: "Install unattended upgrades"
  ansible.builtin.apt:
    name: "unattended-upgrades"
    state: present

- name: "Configure unattended upgrades"
  ansible.builtin.template:
    src: "52unattended-upgrades-local.j2"
    dest: "/etc/apt/apt.conf.d/52unattended-upgrades-local"
    owner: root
    group: root
    mode: "0644"

- name: "Create apt daily upgrade timer override directory"
  ansible.builtin.file:
    path: "/etc/systemd/system/apt-daily-upgrade.timer.d"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Schedule unattended upgrades"
  ansible.builtin.template:
    src: "timer-override.conf.j2"
    dest: "/etc/systemd/system/apt-daily-upgrade.timer.d/override.conf"
    owner: root
    group: root
    mode: "0644"
  notify: "Restart apt upgrade timer"

- name: "Enable and start apt daily upgrade timer"
  ansible.builtin.systemd_service:
    name: "apt-daily-upgrade.timer"
    enabled: true
    state: started
